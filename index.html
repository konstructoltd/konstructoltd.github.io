<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konstructo | Expert Carpentry & Joinery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0b509b;    /* Your Logo Blue */
            --dark-blue: #052140;
            --accent-wood: #d4a373;     /* Sophisticated Wood Accent */
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --white: #ffffff;
            --gray-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--white);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* --- Header & Navigation --- */
        header {
            background-color: var(--white);
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-img {
            height: 80px; 
            width: auto;
            display: block;
        }

        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 600; font-size: 0.9rem; }

        /* --- Hero Section (Professional Design) --- */
        .hero {
            background: linear-gradient(150deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            color: white;
            padding: 7rem 0;
            position: relative;
            overflow: hidden;
        }

        .hero .container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            font-weight: 800;
            color: white;
        }

        .hero-content p {
            font-size: 1.25rem;
            margin-bottom: 2.5rem;
            opacity: 0.9;
            max-width: 500px;
        }

        /* Professional Glass Cards */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .hero-image-card {
            text-align: center;
        }

        .hero-image-card i {
            font-size: 3.5rem;
            color: var(--accent-wood);
            margin-bottom: 1rem;
        }

        /* --- Buttons --- */
        .btn {
            display: inline-block;
            background-color: var(--accent-wood);
            color: white;
            font-weight: 700;
            padding: 1.1rem 2.2rem;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }

        /* --- Mobile Call Button --- */
        .mobile-call-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--primary-blue);
            color: white;
            text-align: center;
            padding: 1.2rem;
            font-weight: 800;
            text-decoration: none;
            z-index: 9999;
        }

        /* --- Services Section --- */
        .section { padding: 6rem 0; }
        .section-title { text-align: center; margin-bottom: 4rem; }
        .section-title h2 { font-size: 2.5rem; color: var(--primary-blue); }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .service-card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 20px;
            border: 1px solid #edf2f7;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.05);
        }

        .service-icon { font-size: 2.5rem; color: var(--primary-blue); margin-bottom: 1.5rem; }

        /* --- Contact Section --- */
        .contact-box {
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            border-radius: 30px;
            padding: 5rem 2rem;
            text-align: center;
            color: white;
        }

        footer {
            padding: 3rem 0;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid #eee;
        }

        /* --- Responsive Design --- */
        @media (max-width: 900px) {
            .hero .container { grid-template-columns: 1fr; text-align: center; }
            .hero-content h1 { font-size: 2.8rem; }
            .hero-content p { margin: 0 auto 2rem; }
            .nav-links { display: none; }
            .mobile-call-bar { display: block; }
            body { padding-bottom: 60px; }
        }
    </style>
</head>
